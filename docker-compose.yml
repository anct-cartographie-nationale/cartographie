services:
  matomo:
    image: matomo:5
    container_name: matomo
    restart: unless-stopped
    ports:
      - '8080:80'
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: matomo
      MATOMO_DATABASE_DBNAME: matomo
    volumes:
      - matomo-data:/var/www/html
    depends_on:
      matomo-db:
        condition: service_healthy

  matomo-db:
    image: mariadb:11
    container_name: matomo-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: matomo
      MARIADB_USER: matomo
      MARIADB_PASSWORD: matomo
      MARIADB_ROOT_PASSWORD: matomo-root
    volumes:
      - matomo-db-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  # Sentry-compatible error tracking for local verification (single container, SQLite, ephemeral).
  # Log in at http://localhost:8090 with admin@bugsink.local / admin, create a project, then copy its DSN into
  # NEXT_PUBLIC_SENTRY_DSN in .env. Data is lost when the container is removed (down -v / rm).
  bugsink:
    image: bugsink/bugsink:2
    container_name: bugsink
    restart: unless-stopped
    ports:
      - '8090:8000'
    environment:
      # Local-only ephemeral container; not a real secret (kept low-entropy so secret scanners don't flag it).
      SECRET_KEY: bugsink-local-development-only-not-a-real-secret-safe-to-commit-ephemeral-container
      CREATE_SUPERUSER: admin@bugsink.local:admin
      PORT: '8000'
      BASE_URL: http://localhost:8090
      BEHIND_HTTPS_PROXY: 'false'

volumes:
  matomo-data:
  matomo-db-data:
