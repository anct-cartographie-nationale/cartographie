load_module modules/ngx_http_geoip2_module.so;
load_module modules/ndk_http_module.so;
load_module modules/ngx_http_lua_module.so;

worker_processes auto;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # Extraction de l'IP client reelle depuis X-Forwarded-For
    # real_ip_recursive remonte la chaine XFF de droite a gauche en supprimant
    # les IPs privees/reservees (proxys internes) jusqu'a l'IP client reelle.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 100.64.0.0/10;
    set_real_ip_from 127.0.0.0/8;
    set_real_ip_from 169.254.0.0/16;
    set_real_ip_from ::1/128;
    set_real_ip_from fc00::/7;
    set_real_ip_from fe80::/10;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # GeoIP2 utilise $remote_addr (reecrit par realip) par defaut
    geoip2 /usr/share/GeoIP/dbip-country-lite.mmdb {
        auto_reload 60m;
        $geoip2_data_country_code default=XX country iso_code;
    }

    map $geoip2_data_country_code $allowed_country {
        default no;

        # France metropolitaine + DOM-TOM
        FR yes;
        GP yes; # Guadeloupe
        MQ yes; # Martinique
        GF yes; # Guyane francaise
        RE yes; # La Reunion
        YT yes; # Mayotte
        PM yes; # Saint-Pierre-et-Miquelon
        NC yes; # Nouvelle-Caledonie
        PF yes; # Polynesie francaise
        WF yes; # Wallis-et-Futuna
        BL yes; # Saint-Barthelemy
        MF yes; # Saint-Martin

        # Pays limitrophes

        DE yes; # Allemagne
        AD yes; # Andorre
        BE yes; # Belgique
        ES yes; # Espagne
        IT yes; # Italie
        LU yes; # Luxembourg
        MC yes; # Monaco
        GB yes; # Royaume-Uni
        CH yes; # Suisse

        # Moteurs de recherche et CI (Google, Bing, GitHub Actions)
        US yes; # Etats-Unis

        # Monitoring (updown.io)
        FI yes; # Finlande
    }

    # CrowdSec bouncer
    lua_package_path '/usr/lib/nginx/lualib/?.lua;/usr/lib/nginx/lualib/plugins/crowdsec/?.lua;;';
    lua_shared_dict crowdsec_cache 50m;

    init_by_lua_block {
        crowdsec_ready = false
        local ok_req, cs = pcall(require, "crowdsec")
        if not ok_req then
            ngx.log(ngx.ERR, "[CrowdSec] Failed to load module")
            return
        end
        local ok, err = cs.init("/etc/crowdsec/bouncers/crowdsec-openresty-bouncer.conf", "crowdsec-openresty-bouncer/v1.1.1")
        if ok == nil then
            ngx.log(ngx.ERR, "[CrowdSec] " .. err)
        elseif ok == "Disabled" then
            ngx.log(ngx.ALERT, "[CrowdSec] Bouncer disabled")
        else
            ngx.log(ngx.ALERT, "[CrowdSec] Bouncer initialized")
            crowdsec_ready = true
        end
    }

    init_worker_by_lua_block {
        if not crowdsec_ready then return end
        local cs = require "crowdsec"
        local mode = cs.get_mode()
        if string.lower(mode) == "stream" then
            cs.SetupStream()
        end
        if ngx.worker.id() == 0 then
            cs.SetupMetrics()
        end
    }

    # Logs enrichis avec pays et statut cache (stdout -> Grafana)
    log_format main '$remote_addr xff="$http_x_forwarded_for" $geoip2_data_country_code $upstream_cache_status '
                    '$status $request_method "$uri" '
                    'rt=$request_time ut=$upstream_response_time '
                    'bytes=$bytes_sent ua="$http_user_agent"';

    # Logs au format combined pour CrowdSec (fichier)
    access_log /var/log/nginx/access.log combined;

    # Desactiver les logs stdout pour le health check
    map $uri $loggable {
        /api/health 0;
        default 1;
    }
    access_log /dev/stdout main if=$loggable;

    # Bypass cache pour les requetes RSC (navigation client Next.js)
    # Les payloads RSC dependent de next-router-state-tree (unique par session),
    # les cacher fragmenterait le cache inutilement.
    map $http_rsc $skip_cache {
        default 0;
        "1" 1;
    }

    # Compression
    gzip on;
    gzip_types text/css application/javascript application/json text/xml application/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Upstream avec keepalive pour reutiliser les connexions TCP vers Node.js
    upstream nextjs {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    # Rate limiting : 10 requetes/seconde par IP, burst de 20
    limit_req_zone $binary_remote_addr zone=global:10m rate=10r/s;
    limit_req_status 429;

    # Rate limiting bots : 1 requete/seconde par bot (toutes IPs confondues)
    map $http_user_agent $is_bot {
        default "";
        "~*bingbot"     "bingbot";
        "~*googlebot"   "googlebot";
        "~*yandexbot"   "yandexbot";
        "~*ahrefsbot"   "ahrefsbot";
        "~*semrushbot"  "semrushbot";
        "~*dotbot"      "dotbot";
        "~*mj12bot"     "mj12bot";
        "~*facebookexternalhit" "facebookexternalhit";
        "~*meta-externalagent"  "meta-externalagent";
        "~*ChatGPT-User"  "chatgpt";
        "~*GPTBot"        "gptbot";
        "~*CCBot"         "ccbot";
        "~*ClaudeBot"     "claudebot";
        "~*anthropic-ai"  "anthropic";
        "~*Bytespider"    "bytespider";
    }
    limit_req_zone $is_bot zone=bots:1m rate=30r/m;

    # Bloquer les bots sur les exports : retourne 403 si bot detecte
    map $is_bot $deny_bot {
        default 0;
        "~."    1;
    }

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=app_cache:10m max_size=256m inactive=6h use_temp_path=off;

    server {
        listen 80;

        # Page 403 personnalisee
        error_page 403 /403.html;
        location = /403.html {
            root /usr/share/nginx/html;
            internal;
        }

        location /api/health {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
        }

        location /api/fragilite-numerique/ {
            if ($allowed_country = no) {
                return 403;
            }

            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
        }

        location ~* /exporter {
            if ($allowed_country = no) {
                return 403;
            }

            if ($deny_bot) {
                return 403;
            }

            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_http_version 1.1;

            proxy_read_timeout 120s;
            limit_req zone=global burst=5 nodelay;
        }

        location / {
            if ($allowed_country = no) {
                return 403;
            }

            # CrowdSec : verifier si l'IP est bannie
            access_by_lua_block {
                if not crowdsec_ready then return end
                local cs = require "crowdsec"
                cs.Allow(ngx.var.remote_addr)
            }

            limit_req zone=bots burst=3 nodelay;
            limit_req zone=global burst=40 nodelay;

            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_http_version 1.1;

            proxy_connect_timeout 10s;
            proxy_read_timeout 15s;
            proxy_send_timeout 10s;

            proxy_cache app_cache;
            proxy_cache_valid 200 6h;
            proxy_cache_valid 404 1m;
            proxy_ignore_headers Cache-Control Set-Cookie;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_revalidate on;
            proxy_cache_lock on;
            proxy_cache_bypass $skip_cache;
            proxy_no_cache $skip_cache;
            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
