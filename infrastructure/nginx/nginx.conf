load_module modules/ngx_http_geoip2_module.so;

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Extraction de l'IP client reelle depuis X-Forwarded-For
    # Le container serverless Scaleway est toujours derriere un unique proxy
    # Scaleway, seul a pouvoir atteindre le container. On fait confiance a
    # $remote_addr (toujours une IP Scaleway) pour extraire la derniere IP
    # du header X-Forwarded-For, qui est l'IP client ajoutee par Scaleway.
    set_real_ip_from 0.0.0.0/0;
    set_real_ip_from ::/0;
    real_ip_header X-Forwarded-For;

    # GeoIP2 utilise $remote_addr (reecrit par realip) par defaut
    geoip2 /usr/share/GeoIP/dbip-country-lite.mmdb {
        auto_reload 60m;
        $geoip2_data_country_code default=XX country iso_code;
    }

    map $geoip2_data_country_code $allowed_country {
        default no;

        # France metropolitaine + DOM-TOM
        FR yes;
        GP yes; # Guadeloupe
        MQ yes; # Martinique
        GF yes; # Guyane francaise
        RE yes; # La Reunion
        YT yes; # Mayotte
        PM yes; # Saint-Pierre-et-Miquelon
        NC yes; # Nouvelle-Caledonie
        PF yes; # Polynesie francaise
        WF yes; # Wallis-et-Futuna
        BL yes; # Saint-Barthelemy
        MF yes; # Saint-Martin

        # Pays limitrophes

        DE yes; # Allemagne
        AD yes; # Andorre
        BE yes; # Belgique
        ES yes; # Espagne
        IT yes; # Italie
        LU yes; # Luxembourg
        MC yes; # Monaco
        GB yes; # Royaume-Uni
        CH yes; # Suisse

        # Moteurs de recherche et CI (Google, Bing, GitHub Actions)
        US yes; # Etats-Unis

        # Monitoring (updown.io)
        FI yes; # Finlande
    }

    # Compression
    gzip on;
    gzip_types text/html text/css application/javascript application/json text/xml application/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # Upstream avec keepalive pour reutiliser les connexions TCP vers Node.js
    upstream nextjs {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=app_cache:10m max_size=256m inactive=6h use_temp_path=off;

    server {
        listen 80;

        location /api/health {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
        }

        location / {
            if ($allowed_country = no) {
                return 403;
            }

            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_http_version 1.1;

            proxy_cache app_cache;
            proxy_cache_valid 200 6h;
            proxy_cache_valid 404 1m;
            proxy_ignore_headers Cache-Control Set-Cookie;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_revalidate on;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
