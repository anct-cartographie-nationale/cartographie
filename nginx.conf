load_module modules/ngx_http_geoip2_module.so;

events {
    worker_connections 1024;
}

http {
    geoip2 /usr/share/GeoIP/dbip-country-lite.mmdb {
        auto_reload 60m;
        $geoip2_data_country_code default=FR source=$http_x_forwarded_for country iso_code;
    }

    map $geoip2_data_country_code $allowed_country {
        default no;

        # Requetes internes (health checks, pas de X-Forwarded-For)
        # Le default=FR dans geoip2 autorise les requetes sans header

        # France metropolitaine + DOM-TOM
        FR yes;
        GP yes; # Guadeloupe
        MQ yes; # Martinique
        GF yes; # Guyane francaise
        RE yes; # La Reunion
        YT yes; # Mayotte
        PM yes; # Saint-Pierre-et-Miquelon
        NC yes; # Nouvelle-Caledonie
        PF yes; # Polynesie francaise
        WF yes; # Wallis-et-Futuna
        BL yes; # Saint-Barthelemy
        MF yes; # Saint-Martin

        # Pays limitrophes

        DE yes; # Allemagne
        AD yes; # Andorre
        BE yes; # Belgique
        ES yes; # Espagne
        IT yes; # Italie
        LU yes; # Luxembourg
        MC yes; # Monaco
        GB yes; # Royaume-Uni
        CH yes; # Suisse

        # Moteurs de recherche et CI (Google, Bing, GitHub Actions)
        US yes; # Etats-Unis

        # Monitoring (updown.io)
        FI yes; # Finlande
    }

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=app_cache:10m max_size=256m inactive=6h;

    server {
        listen 80;

        location /api/health {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
        }

        location / {
            if ($allowed_country = no) {
                return 403;
            }

            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache app_cache;
            proxy_cache_valid 200 6h;
            proxy_cache_valid 404 1m;
            proxy_ignore_headers Cache-Control Set-Cookie;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}
